# HorizontalPodAutoscaler for the HPA comparison experiments.
# Edit averageUtilization to 70 or 90 between runs (see REPORT.md).
# Do NOT run autoscaler.py while this HPA is applied — they conflict.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ml-inference-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ml-inference
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
